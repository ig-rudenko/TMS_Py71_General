services:

  nginx:
    image: nginx:1.31.3-alpine
    ports:
      - "8000:80"
    volumes:
      - "./compose/django_static:/usr/share/nginx/static:ro"
      - "./compose/django_media:/usr/share/nginx/media:ro"
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"

  backend:
    build: .
    image: django:0.4
    command: /bin/sh /app/run.sh
    environment:
      DB_NAME: ${POSTGRES_DB:?set POSTGRES_DB}
      DB_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DB_HOST: database

      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_REDIS_CACHE: redis://cache:6379/0
      CELERY_BROKER_URL: redis://cache:6379/1
      CELERY_RESULT_BACKEND: redis://cache:6379/1

      EMAIL_HOST: ${EMAIL_HOST:-smtp.yandex.ru}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-0}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-1}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:?set EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:?set EMAIL_HOST_PASSWORD}

    ports:
      - "8080:8000"
    volumes:
      - "./compose/django_static:/app/static"
      - "./compose/django_media:/app/media"

  database:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - "./compose/postgres:/var/lib/postgresql/18/docker"

  cache:
    image: redis:8.6.4-alpine
