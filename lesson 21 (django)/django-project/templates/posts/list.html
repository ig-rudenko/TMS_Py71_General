{% extends 'base.html' %}

{% block content %}

    <div class="w-100">
        <form method="get" action="{% url 'notes-list' %}" class="mb-4">
          <div class="mb-3">
            <label for="search-field" class="form-label">Поиск</label>
            <input type="text" class="form-control" name="search" id="search-field" value="{{ request.GET.search }}">
          </div>
            <button type="submit" class="btn btn-primary">Найти</button>
        </form>
    </div>

    <div class="d-flex flex-wrap gap-3">
        {% for note in notes_qs %}

            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">{{ note.title }}</h5>
                    <h6 class="card-subtitle mb-2 text-body-secondary">{{ note.user.username }}</h6>
                    <h6 class="card-subtitle mb-2 text-body-secondary">{{ note.updated_at | date:'l j M. Y H:i' }}</h6>
                    <div class="d-flex flex-wrap gap-2 mt-2">
                        {% for tag in note.tags.all %}
                            <div class="badge text-bg-primary">{{ tag }}</div>
                        {% endfor %}
                    </div>
                    <p class="card-text">
                        {{ note.short_content | truncatewords:10 }}
                    </p>
                    <a href="{% url 'notes-detail' note_id=note.id %}" class="card-link">Посмотреть</a>
                </div>
            </div>

        {% endfor %}
    </div>

{% endblock %}
