{% extends 'base.html' %}

{% block content %}

<div class="d-flex flex-wrap gap-3">
    {% for post in posts %}

    <div class="card" style="width: 18rem;">
        <div class="card-body">
            <h5 class="card-title">{{ post.title }}</h5>
            <h6 class="card-subtitle mb-2 text-body-secondary">{{ post.updated_at }}</h6>
            <p class="card-text">
                {{ post.content }}
            </p>
            <!--        <a href="#" class="card-link">Card link</a>-->
            <!--        <a href="#" class="card-link">Another link</a>-->
        </div>
    </div>

    {% endfor %}
</div>

{% endblock %}
