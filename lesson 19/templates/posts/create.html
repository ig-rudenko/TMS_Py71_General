{% extends 'base.html' %}

{% block content %}

<div class="alert alert-danger" role="alert">
  {{ error }}
</div>

<form action="/posts/create" method="post">
    <div class="mb-3">
        <label for="title_id" class="form-label">Заголовок</label>
        <input type="text" required name="title" class="form-control" id="title_id">
    </div>
    <div class="mb-3">
        <label for="content_id" class="form-label">Содержимое</label>
        <textarea required name="content" class="form-control" id="content_id" rows="3"></textarea>
    </div>
    <input type="submit" class="btn btn-primary" value="Создать">
</form>

{% endblock %}
